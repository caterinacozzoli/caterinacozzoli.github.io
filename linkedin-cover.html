<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>LinkedIn Cover — Caterina Cozzoli</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Onest:wght@300;400;500;600;700&family=Gochi+Hand&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'Chunko';
      src: url('public/fonts/Chunko-Bold.otf') format('opentype');
      font-weight: 700;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 1584px;
      height: 396px;
      overflow: hidden;
      background: #f5f3ee;
    }

    .banner {
      width: 1584px;
      height: 396px;
      position: relative;
      overflow: hidden;
      /* stesso sfondo portfolio hero */
      background-color: rgba(254, 215, 40, 0.11);
      background-image: url('public/images/textures/carta acquarello.jpg');
      background-size: cover;
      background-position: center;
    }

    /* Watercolor blobs — very subtle, atmospheric */
    .wc-blob {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }

    /* Gold — top-left, barely there */
    .wc-blob--gold {
      width: 500px;
      height: 380px;
      top: -90px;
      left: -60px;
      background: rgba(254, 215, 40, 0.07);
      filter: url(#watercolor-sm);
      z-index: 1;
    }

    /* Lavender — right-bottom, soft anchor */
    .wc-blob--lavender {
      width: 700px;
      height: 520px;
      bottom: -180px;
      right: -60px;
      background: rgba(137, 66, 254, 0.09);
      filter: url(#watercolor);
      z-index: 1;
    }

    /* ── LEFT CONTENT ── */
    .content {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 820px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding: 36px 0 0 60px;
      z-index: 10;
    }

    /* Name — Chunko, dominant, top-left */
    .hero-name {
      font-family: 'Chunko', sans-serif;
      font-weight: 700;
      font-size: 92px;
      line-height: 0.88;
      color: #212529;
      letter-spacing: -0.02em;
      text-transform: uppercase;
      user-select: none;
    }

    /* Role pill — compact, elegant, under name */
    .hero-role {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 20px;
    }

    .role-title {
      font-family: 'Onest', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #8942FE;
    }

    .role-sep {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: #b0b4ba;
      display: inline-block;
      flex-shrink: 0;
    }

    .role-location {
      font-family: 'Onest', sans-serif;
      font-size: 13px;
      font-weight: 400;
      color: #6b6f75;
      letter-spacing: 0.04em;
    }

    /* ── RIGHT SIDE — avatar ── */
    .avatar-zone {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 760px;
      z-index: 10;
    }

    /* Avatar halo */
    .avatar-halo {
      position: absolute;
      top: 50%;
      right: 80px;
      transform: translateY(-50%);
      width: 440px;
      height: 440px;
      background: radial-gradient(circle,
        rgba(137, 66, 254, 0.09) 0%,
        rgba(254, 215, 40, 0.04) 50%,
        transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 7;
    }

    /* Avatar */
    .avatar {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      right: 96px;
      width: 360px;
      height: auto;
      filter: drop-shadow(0 16px 40px rgba(33,37,41,0.14));
      z-index: 8;
    }

    /* Impact phrase */
    .hero-phrase {
      font-family: 'Onest', sans-serif;
      font-size: 16px;
      font-weight: 400;
      line-height: 1.5;
      color: #3a3e44;
      letter-spacing: 0.01em;
      margin-top: 4px;
      max-width: 400px;
    }

    /* Role left — sotto il nome */
    .hero-role-left {
      font-family: 'Onest', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #8942FE;
      margin-top: 4px;
    }

    /* ── NUVOLA con punchline — copre bocca avatar ── */
    .nuvola-wrap {
      position: absolute;
      right: 264px;
      top: 236px;
      width: 296px;
      z-index: 12;
    }

    .nuvola-img {
      width: 100%;
      height: auto;
      display: block;
    }

    .nuvola-text {
      position: absolute;
      top: 22%;
      left: 2%;
      right: 24%;
      bottom: 10%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Gochi Hand', cursive;
      font-size: 15px;
      font-weight: 400;
      line-height: 1.15;
      color: #212529;
      text-align: center;
      transform: translate(10px, 4px);
      pointer-events: none;
    }

    /* ── DECORATIVE: thin purple line left edge ── */
    .left-bar {
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 60px;
      background: #8942FE;
      border-radius: 0 3px 3px 0;
      z-index: 10;
    }

    /* ── DECORATIVE: yellow accent dot — safe zone only ── */
    .accent-dot {
      position: absolute;
      left: 60px;
      top: 36px;
      width: 8px;
      height: 8px;
      background: #FED728;
      border-radius: 50%;
      z-index: 10;
      box-shadow: 0 0 0 3px rgba(254,215,40,0.22);
    }

    /* ── DECORATIVE: dot field — subtle constellation ── */
    .dot-field {
      position: absolute;
      top: 0;
      left: 820px;
      width: 200px;
      height: 396px;
      pointer-events: none;
      z-index: 8;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="banner">

    <!-- SVG watercolor filters -->
    <svg width="0" height="0" style="position:absolute" aria-hidden="true">
      <defs>
        <filter id="watercolor" x="-60%" y="-60%" width="220%" height="220%">
          <feTurbulence type="fractalNoise" baseFrequency="0.008 0.012" numOctaves="6" seed="8" result="noise"/>
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="90" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
          <feGaussianBlur in="displaced" stdDeviation="18"/>
        </filter>
        <filter id="watercolor-sm" x="-40%" y="-40%" width="180%" height="180%">
          <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="5" seed="3" result="noise"/>
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="60" xChannelSelector="R" yChannelSelector="G" result="disp"/>
          <feGaussianBlur in="disp" stdDeviation="14"/>
        </filter>
      </defs>
    </svg>

    <!-- BG: carta acquarello via .banner, blobs via CSS -->
    <div class="wc-blob wc-blob--gold"     aria-hidden="true"></div>
    <div class="wc-blob wc-blob--lavender" aria-hidden="true"></div>

    <!-- Left bar -->
    <div class="left-bar"   aria-hidden="true"></div>
    <!-- Yellow dot accent (safe zone: top-left area near name, not bottom-left) -->
    <div class="accent-dot" aria-hidden="true"></div>

    <!-- Dot constellation -->
    <svg class="dot-field" viewBox="0 0 200 396" aria-hidden="true">
      <circle cx="24"  cy="44"  r="2.2" fill="#8942FE" opacity="0.22"/>
      <circle cx="72"  cy="28"  r="1.6" fill="#FED728" opacity="0.55"/>
      <circle cx="130" cy="60"  r="1.8" fill="#8942FE" opacity="0.16"/>
      <circle cx="178" cy="38"  r="1.4" fill="#212529" opacity="0.14"/>
      <circle cx="44"  cy="200" r="1.6" fill="#FED728" opacity="0.4"/>
      <circle cx="110" cy="188" r="2.2" fill="#8942FE" opacity="0.13"/>
      <circle cx="165" cy="215" r="1.8" fill="#212529" opacity="0.11"/>
      <circle cx="28"  cy="338" r="1.8" fill="#8942FE" opacity="0.18"/>
      <circle cx="88"  cy="356" r="1.4" fill="#FED728" opacity="0.4"/>
      <circle cx="152" cy="330" r="2"   fill="#8942FE" opacity="0.12"/>
    </svg>

    <!-- Content -->
    <div class="content">
      <div class="hero-name" aria-label="Caterina Cozzoli">
        <span style="display:block">Caterina</span>
        <span style="display:block">Cozzoli</span>
      </div>
      <span class="hero-role-left">UX/UI Designer</span>

    </div>

    <!-- Nuvola con punchline — vicino avatar come nel sito -->
    <div class="nuvola-wrap" aria-hidden="true">
      <img class="nuvola-img" src="public/images/nuvola.png" alt="">
      <p class="nuvola-text">
        Human-centered<br>per natura.<br>AI-driven per scelta.
      </p>
    </div>

    <!-- Avatar -->
    <div class="avatar-zone" aria-hidden="true">
      <div class="avatar-halo"></div>
      <img class="avatar"
           src="public/images/avatar/avatar-caterina-default.png"
           alt="Caterina Cozzoli">
    </div>

  </div>
</body>
</html>
