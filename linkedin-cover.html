<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>LinkedIn Cover — Caterina Cozzoli</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&family=Onest:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'Chunko';
      src: url('public/fonts/Chunko-Bold.otf') format('opentype');
      font-weight: 700;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 1584px;
      height: 396px;
      overflow: hidden;
      background: #f5f3ee;
    }

    /* ── BANNER ROOT ── */
    .banner {
      width: 1584px;
      height: 396px;
      position: relative;
      overflow: hidden;
      background-color: #f5f3ee;
    }

    /* ── PAPER TEXTURE ── */
    .paper-texture {
      position: absolute;
      inset: 0;
      background-image: url('public/images/textures/paper-texture.png');
      background-size: 400px 400px;
      background-repeat: repeat;
      opacity: 0.6;
      z-index: 0;
    }

    /* ── WATERCOLOR BLOBS — same SVG filter technique as hero ── */
    .wc-blob {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
    }

    /* Gold blob — top-left warmth, subtle */
    .wc-blob--gold {
      width: 560px;
      height: 400px;
      top: -100px;
      left: -80px;
      background: rgba(254, 215, 40, 0.10);
      filter: url(#watercolor-sm);
    }

    /* Lavender blob — bottom-right, visible */
    .wc-blob--lavender {
      width: 780px;
      height: 580px;
      bottom: -180px;
      right: -80px;
      background: rgba(137, 66, 254, 0.17);
      filter: url(#watercolor);
    }

    /* Lavender accent — top-right */
    .wc-blob--lavender-sm {
      width: 320px;
      height: 320px;
      top: -70px;
      right: 200px;
      background: rgba(137, 66, 254, 0.10);
      filter: url(#watercolor-sm);
    }

    /* ── LEFT CONTENT ── */
    .content {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 880px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 32px 0 32px 56px;
      z-index: 10;
    }

    /* Top meta */
    .hero-meta {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .hero-tagline {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #8942FE;
    }

    .hero-location {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 12px;
      font-weight: 400;
      color: #6b6f75;
      letter-spacing: 0.04em;
    }

    /* Description */
    .hero-description {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 17px;
      font-weight: 400;
      line-height: 1.55;
      color: #212529;
      max-width: 480px;
    }

    .desc-role {
      font-weight: 700;
      color: #8942FE;
    }

    /* Name — Chunko, large, top */
    .hero-name {
      font-family: 'Chunko', sans-serif;
      font-weight: 700;
      font-size: 78px;
      line-height: 0.9;
      color: #212529;
      letter-spacing: -0.01em;
      text-transform: uppercase;
      user-select: none;
    }

    /* ── RIGHT SIDE — avatar zone ── */
    .avatar-zone {
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 704px;
      z-index: 10;
    }

    /* Avatar — large, centered vertically, right side */
    .avatar {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      right: 100px;
      width: 340px;
      height: auto;
      filter: drop-shadow(0 12px 32px rgba(33,37,41,0.15));
    }

    /* ── STICKERS — center zone ── */
    .sticker {
      position: absolute;
      z-index: 9;
      pointer-events: none;
      filter: drop-shadow(0 4px 12px rgba(33,37,41,0.13));
    }

    .sticker--hand {
      width: 100px;
      top: 16px;
      left: 760px;
      transform: rotate(-12deg);
    }

    .sticker--parlamento {
      width: 110px;
      bottom: 14px;
      left: 780px;
      transform: rotate(8deg);
    }

    .sticker--tag {
      width: 90px;
      top: 50%;
      left: 920px;
      transform: translateY(-50%) rotate(-9deg);
    }

    .sticker--bicocca {
      width: 86px;
      top: 12px;
      left: 980px;
      transform: rotate(11deg);
    }

    /* ── VERTICAL LEFT ACCENT ── */
    .left-bar {
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 56px;
      background: #8942FE;
      border-radius: 0 3px 3px 0;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div class="banner">

    <!-- SVG watercolor filter — same as portfolio hero -->
    <svg width="0" height="0" style="position:absolute" aria-hidden="true">
      <defs>
        <filter id="watercolor" x="-60%" y="-60%" width="220%" height="220%">
          <feTurbulence type="fractalNoise" baseFrequency="0.008 0.012" numOctaves="6" seed="8" result="noise"/>
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="90" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
          <feGaussianBlur in="displaced" stdDeviation="18" result="blurred"/>
        </filter>
        <filter id="watercolor-sm" x="-40%" y="-40%" width="180%" height="180%">
          <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="5" seed="3" result="noise"/>
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="60" xChannelSelector="R" yChannelSelector="G" result="disp"/>
          <feGaussianBlur in="disp" stdDeviation="14"/>
        </filter>
      </defs>
    </svg>

    <!-- Paper texture -->
    <div class="paper-texture" aria-hidden="true"></div>

    <!-- Watercolor blobs removed -->

    <!-- Left accent bar -->
    <div class="left-bar" aria-hidden="true"></div>

    <!-- Main content -->
    <div class="content">
      <!-- Top: name -->
      <div class="hero-name" aria-label="Caterina Cozzoli">
        <span style="display:block">Caterina</span>
        <span style="display:block">Cozzoli</span>
      </div>

      <!-- Middle: description -->
      <p class="hero-description">
        Progetto esperienze digitali<br>
        <span class="desc-role">inclusive, intuitive</span> e significative.
      </p>

      <!-- Bottom: tagline + location -->
      <div class="hero-meta">
        <span class="hero-tagline">Junior UX/UI Designer</span>
        <span class="hero-location">Milano · Fortaleza</span>
      </div>
    </div>

    <!-- Stickers — center -->
    <img class="sticker sticker--hand"
         src="public/images/sticker/sticker abilicity.png"
         alt="" aria-hidden="true">
    <img class="sticker sticker--parlamento"
         src="public/images/sticker/sticker parlameneto.png"
         alt="" aria-hidden="true">
    <img class="sticker sticker--tag"
         src="public/images/sticker/sticker tag.png"
         alt="" aria-hidden="true">
    <img class="sticker sticker--bicocca"
         src="public/images/logos/bicocca.svg"
         alt="" aria-hidden="true">

    <!-- Right: avatar zone -->
    <div class="avatar-zone" aria-hidden="true">

      <!-- Avatar -->
      <img class="avatar"
           src="public/images/avatar/avatar-caterina-default.png"
           alt="Caterina Cozzoli">
    </div>

  </div>
</body>
</html>
